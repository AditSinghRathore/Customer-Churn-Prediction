<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Customer Churn Prediction</h1>
    <p class="subtitle">Predict whether a customer is likely to churn.</p>

    <form action="/predict" method="POST">

        <fieldset>

            <legend>Customer Details</legend>

            <label>Gender</label>
            <select name="gender">
                <option selected>Female</option>
                <option>Male</option>
            </select>

            <label>Senior Citizen</label>
            <select name="SeniorCitizen">
                <option value="0" selected>No</option>
                <option value="1">Yes</option>
            </select>

            <label>Partner</label>
            <select name="Partner">
                <option selected>Yes</option>
                <option>No</option>
            </select>

            <label>Dependents</label>
            <select name="Dependents">
                <option selected>No</option>
                <option>Yes</option>
            </select>

            <label>Tenure (Months)</label>
            <input type="number" name="tenure" value="12">

        </fieldset>


        <fieldset>

            <legend>Services</legend>

            <label>Phone Service</label>
            <select name="PhoneService">
                <option selected>Yes</option>
                <option>No</option>
            </select>

            <label>Multiple Lines</label>
            <select name="MultipleLines">
                <option selected>No</option>
                <option>Yes</option>
                <option>No phone service</option>
            </select>

            <label>Internet Service</label>
            <select name="InternetService">
                <option selected>DSL</option>
                <option>Fiber optic</option>
                <option>No</option>
            </select>

            <label>Online Security</label>
            <select name="OnlineSecurity">
                <option selected>No</option>
                <option>Yes</option>
                <option>No internet service</option>
            </select>

            <label>Online Backup</label>
            <select name="OnlineBackup">
                <option selected>Yes</option>
                <option>No</option>
                <option>No internet service</option>
            </select>

            <label>Device Protection</label>
            <select name="DeviceProtection">
                <option selected>No</option>
                <option>Yes</option>
                <option>No internet service</option>
            </select>

            <label>Tech Support</label>
            <select name="TechSupport">
                <option selected>No</option>
                <option>Yes</option>
                <option>No internet service</option>
            </select>

            <label>Streaming TV</label>
            <select name="StreamingTV">
                <option selected>No</option>
                <option>Yes</option>
                <option>No internet service</option>
            </select>

            <label>Streaming Movies</label>
            <select name="StreamingMovies">
                <option selected>No</option>
                <option>Yes</option>
                <option>No internet service</option>
            </select>

        </fieldset>


        <fieldset>

            <legend>Billing</legend>

            <label>Contract</label>
            <select name="Contract">
                <option selected>Month-to-month</option>
                <option>One year</option>
                <option>Two year</option>
            </select>

            <label>Paperless Billing</label>
            <select name="PaperlessBilling">
                <option selected>Yes</option>
                <option>No</option>
            </select>

            <label>Payment Method</label>
            <select name="PaymentMethod">
                <option selected>Electronic check</option>
                <option>Mailed check</option>
                <option>Bank transfer (automatic)</option>
                <option>Credit card (automatic)</option>
            </select>

            <label>Monthly Charges</label>
            <input type="number"
                   step="0.01"
                   name="MonthlyCharges"
                   value="65.30">

            <label>Total Charges</label>
            <input type="number"
                   step="0.01"
                   name="TotalCharges"
                   value="783.60">

        </fieldset>

        <button type="submit">
            Predict Churn
        </button>

    </form>

    {% if prediction %}

    <div class="result">

        <h2>Prediction</h2>

        {% if prediction == "Yes" %}
            <p>Customer is likely to churn.</p>
        {% else %}
            <p>Customer is likely to stay.</p>
        {% endif %}

    </div>

    {% endif %}

</div>

</body>
</html>
